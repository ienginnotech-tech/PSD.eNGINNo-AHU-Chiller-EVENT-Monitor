<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AHU & Chilled Water System — Exhibition Hall Zone Dashboard</title>

</head>

<header class="topbar">

<main class="layout">

<footer>

</footer>
<script src="config.js"></script>
